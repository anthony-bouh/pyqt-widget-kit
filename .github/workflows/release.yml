name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example v2.0.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  github-release:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate release tag and package version
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Release tag must match vX.Y.Z, got '$RELEASE_TAG'."
            exit 1
          fi

          package_version="$(python -c 'import tomllib, pathlib; print(tomllib.loads(pathlib.Path("pyproject.toml").read_text(encoding="utf-8"))["project"]["version"])')"
          expected_version="${RELEASE_TAG#v}"

          if [[ "$package_version" != "$expected_version" ]]; then
            echo "::error::pyproject.toml version '$package_version' does not match tag '$RELEASE_TAG'."
            exit 1
          fi

      - name: Install build backend
        run: python -m pip install build

      - name: Build distribution archives
        run: python -m build

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$RELEASE_TAG" dist/* \
            --title "$RELEASE_TAG" \
            --generate-notes
